openapi: 3.0.3

info:
  title: Commerce API
  version: 1.0.0
  description: API documentation for the Commerce API

servers:
  - url: http://localhost:3000/api

tags:
  - name: Items
    description: Operations related to items
  - name: Auth
    description: User authentication endpoints

paths:
  /items:
    get:
      tags:
        - Items
      parameters:
        - in: query
          name: search
          schema:
            type: string
          required: false
          description: Filter posts by matching name
        - in: query
          name: sortBy
          schema:
            type: string
          required: false
          description: Field to sort by (e.g., name, price)
        - in: query
          name: order
          schema:
            type: string
          required: false
          description: 'Sort order: asc or desc'
        - in: query
          name: offset
          schema:
            type: integer
          required: false
          description: Number of posts to skip (used for pagination)
        - in: query
          name: limit
          schema:
            type: integer
          required: false
          description: Number of items to return per page
      summary: Get all items
      description: Retrieve a list of all items for sale.
      responses:
        '200':
          description: A list of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      security:
        - bearerAuth: []
      tags:
        - Items
      summary: Create a new item
      description: Create a new item for sale.
      requestBody:
        description: The item object to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '201':
          description: Item successfully created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/InvalidItemInput'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /items/{id}:
    get:
      tags:
        - Items
      summary: Get an item by ID
      description: Retrieve a single item by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: A single item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/InvalidId'
    put:
      tags:
        - Items
      security:
        - bearerAuth: []
      summary: Update an item by ID
      description: Update a single item by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        description: Fields to update for the item. At least one of the "name" or "price" must be provided.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Item'
      responses:
        '200':
          description: Item updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - Items
      security:
        - bearerAuth: []
      summary: Delete an item by ID
      description: Delete a single item by its ID.
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Item deleted successfully
        '400':
          $ref: '#/components/responses/InvalidId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
          
  /auth/login:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticate a user and return an access token.
      requestBody:
        description: User login credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                example:
                  accessToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Invalid credentials'
  /auth/signup:
    post:
      tags:
        - Auth
      summary: Register user
      description: Creates a new user account.
      requestBody:
        description: user signup credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '201':
          description: Sign up successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 1
                  email:
                    type: string
                    example: 'test@test.com'
                  role:
                    type: string
                    example: USER
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          description: Duplicate email
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Email has already been used'

components:
  schemas:
    Item:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: 'Television'
        price:
          type: number
          example: 500
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      example:
        email: 'user@example.com'
        password: 'password123'
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: integer
        example: 1
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: string
            example:
              error: 'Resource 1 not found'
    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors: ['ID must be a positive integer']
    InvalidItemInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Name must be at least 3 characters'
    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authenticated. Please provide a valid token.'
    InvalidUserInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - 'Email is required'
                - 'Password is required'
    Forbidden:
      description: Client is not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example: 
              error: 'Forbidden: insufficient permission.'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
